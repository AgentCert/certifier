{# blocks/part_banner.html — navy gradient strip marking a major part.
   Expects: {type:"part_banner", label, title} #}
<div class="part-banner">
  {% if block.label %}<span class="part-banner__label">{{ block.label }}</span>{% endif %}
  {% if block.title %}<span class="part-banner__title">{{ block.title }}</span>{% endif %}
</div>
