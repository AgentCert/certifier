# =============================================================================
# Certifier — Docker Compose
#
# Service exposed on the host:
#   app  – Certifier FastAPI application  http://localhost:${API_PORT:-8000}/
#          Swagger UI at /docs, OpenAPI at /openapi.json
#
# MongoDB is NOT bundled here. The app uses the shared monorepo mongo started
# by `scripts/start-local-services.sh` (admin:1234 replSet rs0). Inside the
# container the host mongo is reachable via `host.docker.internal` thanks to
# the `extra_hosts: host-gateway` mapping below.
#
# Quick start:
#   1. Ensure /srv/projects/ace-monorepo/.env has the certifier block filled in.
#   2. Bring up the shared mongo first:
#        ../scripts/start-local-services.sh --only-mongo
#   3. Then start the certifier:
#        docker compose --env-file ../.env up --build -d
#      (or `scripts/start-local-services.sh --only-certifier`)
#   4. Open http://localhost:${API_PORT:-8000}/docs
#
# Override the mongo connection string from outside via CERTIFIER_MONGODB_URI
# if the certifier needs to talk to a different mongo (e.g. a cloud cluster).
# =============================================================================

services:

  # ── Certifier API ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Target the final runtime stage (skips re-running builder on plain `up`)
      target: runtime
    # Override CERTIFIER_IMAGE in your env to pull a published image instead
    # of building from this Dockerfile. e.g. CERTIFIER_IMAGE=agentcert/certifier:latest
    image: ${CERTIFIER_IMAGE:-certifier:latest}
    container_name: certifier_app
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    env_file:
      # Sole source of env: the monorepo-root .env
      - ../.env
    environment:
      # Default points at the script-managed shared mongo (auth + replSet) over
      # host.docker.internal so the same value works inside and outside compose.
      # Override with CERTIFIER_MONGODB_URI if you need a different mongo.
      # `directConnection=true` is required: the shared mongo's replica-set
      # config advertises `host: "localhost:27017"`, which is unreachable from
      # inside this container. Direct-connect bypasses topology discovery and
      # uses the seed host as-is.
      MONGODB_CONNECTION_STRING: "${CERTIFIER_MONGODB_URI:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-1234}@host.docker.internal:27017/${MONGODB_DATABASE:-agentcert}?authSource=admin&directConnection=true}"
      PYTHONPATH: /app
      API_PORT: "${API_PORT:-8000}"
      WORKSPACE_DIR: /app/workspace
      CERT_WORKSPACE_DIR: /app/workspace/cert
    volumes:
      # Persist pipeline output (traces, metrics, reports) on the host
      - ./workspace:/app/workspace
    healthcheck:
      test: ["CMD", "sh", "-c",
             "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8000}/docs')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    # Allow the container to reach host-bound services (mongo, Langfuse, LiteLLM)
    # via "host.docker.internal" on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
