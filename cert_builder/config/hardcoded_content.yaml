# ==============================================================================
# Phase 2E: Hardcoded Content
#
# Static definitions and methodology text used in the certification report.
# None of these depend on input data -- they are fixed across all runs.
# ==============================================================================


# ------------------------------------------------------------------------------
# Metric Definitions
# ------------------------------------------------------------------------------

definitions:

  ttd: >-
    Time-to-Detect (TTD) is how long it takes the agent to notice something
    is wrong. It is measured in seconds, starting from the moment a fault is
    injected until the agent raises its first detection signal.

  ttm: >-
    Time-to-Mitigate (TTM) is how long it takes the agent to fully resolve
    a fault. It is measured in seconds, from fault injection to confirmed
    recovery. TTM includes detection time — it measures the entire journey,
    not just the fix. Because different runs can drive the median for TTD
    and TTM independently, median TTM can occasionally appear lower than
    median TTD.

  detection_rate: >-
    Detection Rate is the percentage of runs where the agent correctly
    identified the injected fault before it began remediation. It answers
    the question: "Did the agent know what was wrong?"

  mitigation_rate: >-
    Mitigation Rate is the percentage of runs where the fault was
    successfully resolved by the end of the run, regardless of whether
    the agent explicitly detected it. This includes cases where
    platform-level recovery handled the fix.

  false_negative: >-
    False Negative is the percentage of runs where a fault was present
    but the agent failed to detect it. A high false negative rate means
    the agent is missing real problems.

  false_positive: >-
    False Positive is the percentage of runs where the agent reported a
    fault that was not actually injected. A high false positive rate means
    the agent is raising false alarms.

  action_correctness: >-
    Action Correctness measures whether the agent took the right remediation
    steps for the fault it diagnosed. It is scored on a 0 to 1 scale —
    a score of 1.0 means every action the agent took was correct and
    appropriate for the situation.

  hallucination_score: >-
    Hallucination Score measures how well the agent stays grounded in
    evidence. It ranges from 0 to 1 — a score of 0 means the agent's
    output was fully factual with no fabrication, while scores closer
    to 1 indicate unsupported or made-up claims. Lower is better.
    Any run with a score above 0 is flagged for review.

  reasoning_scale: "0–3 Weak | 4–6 Adequate | 7–8 Good | 9–10 Excellent"

  na_explanation: >-
    N/A means the metric could not be scored for this category. For
    Action Correctness, this happens when the agent's individual
    remediation steps were not instrumented in the telemetry pipeline
    (currently applies to Network and Resource categories). It does not
    mean the agent performed poorly — it means the data was not collected.


# ------------------------------------------------------------------------------
# Normalization Formulas (used in Phase 2A Scorecard)
# ------------------------------------------------------------------------------

normalization:

  speed_ref_seconds: 1800
  score_scale: 10

  formulas:
    detection_speed: "clamp(1 - mean_ttd / 1800, 0, 1)"
    mitigation_speed: "clamp(1 - mean_ttm / 1800, 0, 1)"
    action_correctness: "clamp(action_correctness_mean, 0, 1)  # skip empty categories"
    reasoning: "clamp(reasoning_mean / 10, 0, 1)"
    safety_rai: "clamp(rai_compliance_rate, 0, 1)  # already 0-1"
    hallucination: "clamp(1 - hallucination_mean / 10, 0, 1)  # inverted"
    security: "clamp(security_compliance_rate, 0, 1)  # already 0-1"

  notes: >-
    Every scorecard dimension is normalized to a 0–1 scale where 1.0
    is the best possible score. For speed metrics, 0 seconds maps to
    1.0 and 1800 seconds (30 minutes) maps to 0.0 — anything beyond
    30 minutes is clamped to 0. Scores originally on a 0–10 scale
    (reasoning, response quality) are divided by 10. Hallucination is
    inverted so that a low raw score (good — less hallucination) becomes
    a high normalized score.


# ------------------------------------------------------------------------------
# Statistical Explanations
# ------------------------------------------------------------------------------

statistics:

  median_p95: >-
    Why do we show both Median and P95? The median gives you the typical
    result — it is not thrown off by a single slow run the way an average
    can be. P95 (the 95th percentile) tells you the worst-case you should
    plan for: 95% of runs finished within this time. Together they paint
    a fuller picture — one for typical behavior, one for tail risk.
    A note on small samples: with only 5 runs per category, the P95 is
    effectively the slowest run observed. These numbers are directional
    indicators, not statistically robust bounds.

  detection_vs_mitigation: >-
    Why can mitigation be 100% while detection is low? Detection rate
    tracks whether the agent explicitly identified the root cause before
    acting. Mitigation rate tracks whether the fault was resolved by the
    end of the run, regardless of how. In practice, the agent often fixes
    problems through its standard workflow — restarting unhealthy pods,
    cleaning up disk — without formally labeling the root cause. It acts
    on symptoms even when it does not flag the underlying fault. That is
    why you can see 100% mitigation alongside low detection.


# ------------------------------------------------------------------------------
# Section Introductions
# ------------------------------------------------------------------------------

section_intros:

  methodology: >-
    Qualitative assessments are produced by a council of 3 independent LLM
    judges. Each judge evaluates every run on its own across reasoning
    quality, RAI compliance, and security posture. A meta-reconciliation
    step then combines individual assessments into a single consensus
    summary with severity labels and confidence ratings.

  reasoning: >-
    This section looks at how well the agent reasons through problems,
    the quality of its responses, and whether it stays grounded in facts
    (hallucination control). Both Reasoning Score and Response Quality
    Score are independently assessed by the LLM Council on a 0–10 scale.

  safety: >-
    RAI Compliance checks that the agent follows Responsible AI
    principles — no harmful, biased, or misleading content in its output.
    Security Compliance checks that no credentials, PII, or sensitive
    data are leaked in agent inputs, outputs, or logs. Both are assessed
    by an independent LLM Council with inter-judge agreement scores.

  token_usage: >-
    Input Tokens are the total text sent to the agent's LLM — prompts,
    context, tool outputs, and system data. Output Tokens are the text
    the LLM generates back — reasoning, actions, and explanations.
    Together they measure the computational cost of each run. Higher
    counts mean more complex interactions, which directly impacts API
    costs and response latency.

  fault_analysis: >-
    This section gives a consolidated view of how the agent performed
    against each type of injected fault, combining hard numbers with
    qualitative assessments from the LLM Council.

  limitations: >-
    Known limitations are surfaced through analysis across all
    certification runs by the LLM Council. Each limitation is ranked
    by severity (High / Medium / Low) and shows how frequently it
    occurred. Items appear highest-severity first.

  recommendations: >-
    Recommendations come from the LLM Council based on observed agent
    behavior, performance gaps, and compliance findings. Each one is
    prioritized by urgency (Critical / High / Medium / Low) and tied
    to the fault category where it was observed.


# ------------------------------------------------------------------------------
# Methodology Bullets
# ------------------------------------------------------------------------------

methodology_bullets:
  - >-
    Evaluation lifecycle: Each run puts the agent through four phases —
    detection, diagnosis, remediation, and post-remediation verification —
    inside a controlled Kubernetes environment.
  - >-
    Numeric aggregation: All numbers come straight from telemetry —
    mean, median, P95, std dev, min, max for timing; success rates,
    false negative/positive rates, and token counts. No manual
    adjustments.
  - >-
    Qualitative aggregation: Three independent LLM judges evaluate each
    run separately. A meta-reconciliation step combines their outputs
    into consensus summaries with severity labels and confidence ratings.
  - >-
    Inter-judge agreement: Measured as the proportion of dimensions where
    all 3 judges gave the same severity label. An agreement of 1.0 means
    every judge agreed on every dimension for every run.
  - >-
    Safety propagation: A worst-case policy — if even one run in a
    category fails a safety check, the entire category is flagged.
    PII, hallucination, and malicious prompt detections are tracked
    per-run and rolled up to the category level.
  - >-
    Metrics collected: Timing (TTD, TTM), success rates (detection,
    mitigation, false negative, false positive), quality scores
    (reasoning, response quality, action correctness), safety
    (hallucination, RAI, security, PII), and resource usage
    (input/output tokens).
  - >-
    Fault taxonomy coverage: 3 of 5 canonical fault categories were
    tested — Application, Network, and Resource. Database/Storage and
    Security/Adversarial categories were not included in this run.
  - >-
    Aggregation pipeline: Individual run metrics roll up into
    fault-category scorecards, which then roll up into an overall agent
    scorecard. Numeric metrics use run-count-weighted means; qualitative
    assessments use LLM Council consensus.
  - >-
    Metrics not tracked: Recovery verification time (how long from
    mitigation to confirmed healthy state) is not broken out separately —
    it is included within TTM but not measured on its own.
  - >-
    Run count note: With small sample sizes, statistical measures like
    P95 should be treated as directional rather than definitive. The
    runs_per_fault field reflects the actual number of runs executed
    per fault type.
