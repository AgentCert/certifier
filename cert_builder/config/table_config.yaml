# Table builder configuration
# Static data that doesn't come from Phase 1 output.

judge_models:
  headers: ["Judge", "Model", "Provider", "Role"]
  rows:
    - ["Judge 1", "gpt-4.1", "Azure OpenAI", "Primary evaluator — reasoning, response quality, RAI compliance"]
    - ["Judge 2", "gpt-4.1-mini", "Azure OpenAI", "Secondary evaluator — security compliance, hallucination detection"]
    - ["Judge 3", "gpt-4o", "Azure OpenAI", "Tertiary evaluator — cross-validation, safety propagation checks"]
    - ["Meta-Reconciler", "gpt-4.1", "Azure OpenAI", "Consensus synthesis — aggregates judge outputs into final summaries"]

# Formatting rules
formatting:
  time_suffix: "s"
  time_decimals: 1
  rate_suffix: "%"
  rate_decimals: 0
  score_decimals: 2

# Severity sort order (for limitations)
severity_order: ["High", "Medium", "Low"]

# Priority sort order (for recommendations)
priority_order: ["Critical", "High", "Medium", "Low"]
