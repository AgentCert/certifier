# Chart builder configuration
# Reference lines and thresholds for chart annotations.

reference_lines:
  ttd_concern: { value: 300, label: "Concern Threshold" }
  ttm_concern: { value: 600, label: "Concern Threshold" }
  rates_minimum: { value: 0.5, label: "Minimum Acceptable" }

# Heatmap scale breakpoints
heatmap_scale: [0.0, 0.25, 0.5, 0.75, 1.0]

# Score scale (for normalizing reasoning/response/hallucination to 0-1)
score_scale: 10
