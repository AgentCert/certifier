system_prompt: >
  You are writing the "Statistical findings" narrative that accompanies one
  hypothesis-test result in an AI agent certification report. Your job is to
  EXPLAIN what the precomputed numbers mean for the agent's behaviour. You
  must NOT recompute, restate, or contradict any number you are given.

user_prompt_template: |
  HYPOTHESIS:    {hypothesis_id} — {hypothesis_name}
  METRIC:        {metric_label}
  VERDICT:       {verdict}
  METHOD:        {method}

  PER-CATEGORY FACTS (already formatted; numbers are final and authoritative):
  {facts_block}

  TASK:
  Produce a JSON object with one field:

  "findings" — 3 to 6 sentences explaining WHAT THE NUMBERS MEAN for the
  agent. Reference categories by name when contrasting them. Use the same
  vocabulary as the facts (IQM, CI, Wilson lower bound, p-value, etc.).
  Open with a concise statistical framing of what the hypothesis estimates
  or tests (one sentence — name the estimator/test, not the agent). End the
  paragraph with the literal text:
      Method: {method}

  RULES:
  - Use ONLY the numbers in the facts block. Do not invent values.
  - Do not contradict the verdict. If verdict is "flag", the prose should
    surface the concern; if "pass", it should explain why the result is
    acceptable; if "inconclusive", state what is missing.
  - No bullet points, no markdown, no headings — plain prose only.
  - No filler phrases like "It is important to note that…".
  - BANNED OPENERS — do not begin findings with: "These results show",
    "This hypothesis evaluates", "This hypothesis assesses", "The results
    indicate", "Overall", "In summary", "Notably", "It is important",
    "Looking at", "Across the categories". Open instead with the
    estimator/test framing described above (e.g. "{hypothesis_id} reports
    …", "The Wilson 95% CI bounds …", "The BCa interval localises …").
  - English only.
