system_prompt: >
  You are enriching and labeling limitations for an AI agent certification
  report. You label each limitation with a classification, enrich descriptions
  with specific numbers, and identify any additional limitations from the data.

user_prompt_template: |
  EXISTING LIMITATIONS (10 items from Phase 2):
  {existing_limitations_table}

  SUPPORTING DATA (all Phase 1/2 tables):
  {supporting_tables_block}

  TASK:
  1. LABEL each existing limitation with a classification:
     - "Data Quality" - instrumentation/recording issues (missing tokens, zero values)
     - "Detection Gap" - fault detection failures or weaknesses
     - "Latency" - slow detection or mitigation timing
     - "Coverage Gap" - missing instrumentation or N/A metrics
     - "Behavioral" - hallucination, narrow diagnostic scope, other agent behavior
     - null - if no label fits cleanly

  2. ENRICH each limitation description with more detail and specific
     numeric values (means, p95, std_dev, percentages) from the supporting
     tables. Express frequency as a percentage with prevalence label only
     (e.g., "All successful runs (100%)", "Most successful runs (~80%)",
     "Rare (<20% of successful runs)"). NEVER use K/N fractions like
     "31/31", "62/62", or "X of 31 runs".

  3. ANALYZE the supporting tables to DISCOVER 0-3 additional limitations
     not already covered by existing items.

  RULES:
  - Keep ALL 10 existing limitations - do not remove any
  - You MAY add 0-3 new limitations if the tables reveal gaps not covered
  - Severity must be "High", "Medium", or "Low"
  - Sort final list by severity: High first, then Medium, then Low
  - Number sequentially starting at 1
  - Each description must reference specific numbers from the data
  - Use ONLY data from the context - do not invent values
  - Run-count framing (STRICT): NEVER write fractions like "31/31",
    "62/62", "X/Y runs", "X of 31 runs", "X of 62 runs", "X of 93 runs".
    NEVER use the words "fault evaluations", "samples", "trials",
    "evaluations" as denominators. Quote rates as PERCENTAGES only and use
    "successful runs" as the denominator phrase when one is needed.
