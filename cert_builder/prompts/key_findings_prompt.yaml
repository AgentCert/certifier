system_prompt: >
  You are synthesizing key findings for an AI agent certification report.
  Integrate both qualitative observations and statistical hypothesis results
  to produce unified, evidence-backed findings.

user_prompt_template: |
  CONTEXT:
  
  QUALITATIVE FINDINGS:
  {findings_context_block}
  
  STATISTICAL HYPOTHESIS RESULTS (Quantitative Inference):
  {hypothesis_results_json}

  TASK:
  Synthesize 5-7 key findings that are CONCISE and SHARP — avoid verbosity.
  Integrate both qualitative observations and statistical evidence, but only cite statistics when they 
  directly support or contradict the finding. Skip statistics that merely confirm what is already evident.
  
  When citing statistical evidence, use the measure name (Wilson CI, p-value, Kruskal-Wallis, etc.),
  not hypothesis numbers (H-02, H-03, etc.). Focus on the KEY NUMBER that drives the point.

  RULES FOR EACH FINDING:
  1. Headline: 3-6 words, punchy and direct (e.g., "Hallucination-free performance" or "Safety-floor weakness")
  2. Detail: One or two sentences with specific numbers, severity, and ONLY the statistical evidence that matters
     - Include CI bounds if they reveal a risk (e.g., "CI includes 0%")
     - Include p-values ONLY if they establish significance for a key claim
     - Skip test names (Levene, chi-squared) unless essential to credibility
  3. Severity classification:
     - "concern": Clear performance gap, risk, or statistically significant weakness requiring attention
     - "good": Genuine strength backed by observed or statistical performance
     - "note": Observation worth flagging but not a gap (e.g., category imbalance, minor variance)
  4. Consolidate: Merge related findings into single, unified statements

  CONSTRAINTS:
  - Return exactly 5-7 items
  - At least 1 concern, 1 good, 1 note
  - Use ONLY numbers from the context — do not invent values
  - The overall detection rate is {overall_detection_pct}% and the overall mitigation rate is {overall_mitigation_pct}%, both computed across {successful_runs} successful runs — quote them this way
  - Trace runs: {total_runs} attempted, {successful_runs} successful, {failed_runs} failed — this is the ONLY run accounting allowed in narratives
  - NEVER use the words "fault evaluations", "evaluations", "samples", or fractions like "X/93" or "X/62" — quote rates as percentages and qualify with "across {successful_runs} successful runs" instead
  - When citing per-category counts, use only the "successful runs" count from the per-category breakdown (e.g. "Network: 31 successful runs")
  - BREVITY: Each detail sentence should be 1-2 lines max. Avoid lengthy explanations.
  - Example SHORT findings:
    * "Hallucination-free: Zero hallucinations across all {successful_runs} successful runs."
    * "Safety-floor weakness: Wilson lower bound of 0.0% fails to rule out rare failures."
    * "Category reasoning imbalance: Network (8.57) outperforms Resource (8.42), p=0.015617."
  - Headline must NOT repeat severity word (avoid "Good: reasoning is good")

